name: Deploy to IONOS

# Deploys the site to your IONOS web space over SFTP whenever code lands on the
# main branch (or when you run it manually from the Actions tab).
#
# IMPORTANT — set these repository secrets first (Settings → Secrets and
# variables → Actions → New repository secret). See SETUP-DEPLOY.md for how to
# find each value in the IONOS control panel:
#   IONOS_SFTP_HOST    e.g. access-XXXXXXXX.webspace-host.com  (NOT your DB host)
#   IONOS_SFTP_USER    your SFTP/SSH username
#   IONOS_SFTP_PASS    your SFTP/SSH password
#   IONOS_REMOTE_PATH  web root to deploy into, e.g. /  (or /subfolder)
#   IONOS_SFTP_PORT    optional, defaults to 22
#
# Safety: this NEVER deletes remote files, so your uploaded photos in uploads/
# and your live config.php are preserved. config.php, the run-once tools, and
# repo-only files are excluded from the upload entirely.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets are present
        env:
          HOST: ${{ secrets.IONOS_SFTP_HOST }}
          USER: ${{ secrets.IONOS_SFTP_USER }}
          PASS: ${{ secrets.IONOS_SFTP_PASS }}
        run: |
          missing=""
          [ -z "$HOST" ] && missing="$missing IONOS_SFTP_HOST"
          [ -z "$USER" ] && missing="$missing IONOS_SFTP_USER"
          [ -z "$PASS" ] && missing="$missing IONOS_SFTP_PASS"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secret(s):$missing — see SETUP-DEPLOY.md"
            exit 1
          fi
          echo "All required secrets are set."

      - name: Stage files for upload
        run: |
          set -e
          SRC="Cottage Holidays Blakeney"
          OUT="deploy"
          rm -rf "$OUT"; mkdir -p "$OUT"
          cp -r "$SRC"/. "$OUT"/

          # Apache config ships as htaccess.txt in the repo; it must be .htaccess live.
          [ -f "$OUT/htaccess.txt" ] && mv -f "$OUT/htaccess.txt" "$OUT/.htaccess"

          # Run-once tools must never be live on the server.
          rm -f "$OUT/setup.php" "$OUT/health.php"

          # Never overwrite live secrets — the server keeps its own config.php.
          rm -f "$OUT/config.php"

          # Repo-only / non-served files: tests, docs, stale backups.
          # NOTE: the *.sql files ARE shipped so migrate.php can apply them; they
          # can't be downloaded because .htaccess denies serving *.sql.
          rm -f "$OUT/smoke-test.js"
          rm -f "$OUT"/*.md
          rm -f "$OUT"/index.backup-*.html

          # Don't ship local uploaded photos; keep only the folder guards.
          if [ -d "$OUT/uploads" ]; then
            find "$OUT/uploads" -type f ! -name '.htaccess' ! -name 'README.txt' -delete
          fi

          echo "Staged files:"; ls -la "$OUT"

      - name: Upload via SFTP (lftp mirror)
        env:
          HOST: ${{ secrets.IONOS_SFTP_HOST }}
          USERNAME: ${{ secrets.IONOS_SFTP_USER }}
          LFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASS }}
          PORT: ${{ secrets.IONOS_SFTP_PORT }}
          REMOTE: ${{ secrets.IONOS_REMOTE_PATH }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y lftp
          PORT="${PORT:-22}"
          REMOTE="${REMOTE:-/}"
          # mirror -R = push local->remote, recursively (includes dotfiles like .htaccess).
          # No --delete, so remote-only files (uploaded photos, config.php) are kept.
          # The password is read from LFTP_PASSWORD via --env-password, so it never
          # appears on the command line and special characters can't mangle it.
          lftp -u "$USERNAME" --env-password "sftp://$HOST:$PORT" -e "set sftp:auto-confirm yes; set net:max-retries 3; set net:reconnect-interval-base 5; mirror -R --verbose --no-perms --parallel=2 ./deploy/ \"$REMOTE\"; bye"
          echo "Deploy complete."

      # Best-effort post-deploy hooks: apply any new DB migrations and ping the
      # owner's devices that a new version is live. Both need the APP_SECRET repo
      # secret (matching config.php). If it's unset, these are skipped — the
      # deploy still succeeds.
      - name: Post-deploy (migrate + notify owner)
        if: ${{ success() }}
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$APP_SECRET" ]; then echo "APP_SECRET not set — skipping migrate + release ping."; exit 0; fi
          URL="${SITE_URL:-https://cottageholidaysblakeney.co.uk}"
          echo "Applying migrations…"
          curl -fsS --max-time 60 "$URL/migrate.php?cron=$APP_SECRET" || echo "migrate ping failed (non-fatal)"
          echo "Notifying owner of release…"
          curl -fsS --max-time 30 "$URL/push.php?action=notify_release&cron=$APP_SECRET" || echo "release ping failed (non-fatal)"
          echo "Sending any due enquiry follow-ups…"
          curl -fsS --max-time 30 "$URL/enquiry-nudge.php?cron=$APP_SECRET" || echo "enquiry-nudge ping failed (non-fatal)"
