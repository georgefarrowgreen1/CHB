name: CI

# Tiny safety net: lint every PHP file and run the front-end smoke test on each
# pull request (and on pushes to main) so a broken edit can't reach production.

on:
  push:
    branches: [ main ]
  pull_request: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PHP syntax check (php -l on every .php)
        run: |
          set -e
          find "Cottage Holidays Blakeney" -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: Front-end smoke test
        working-directory: "Cottage Holidays Blakeney"
        run: node smoke-test.js

      - name: Pricing parity (PHP price_breakdown vs JS fixtures)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-pricing.php

      - name: Reply-by-email logic (tokens + quote stripping)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-reply.php

  # Real-browser smoke test: boots the site headless with stubbed APIs and walks
  # the core guest journeys + admin dashboard. Catches the render/integration
  # breakage the DOM-shim smoke test can't see. Runs in parallel with `checks`.
  browser-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        working-directory: "Cottage Holidays Blakeney"
        run: |
          # The hosted runner's Microsoft/Azure apt repos intermittently serve an
          # unsigned InRelease ("NOSPLIT"), which fails `--with-deps`' apt-get and
          # kills the whole browser-test. We don't need those repos, so drop them
          # (and add apt retries) before the install.
          sudo rm -f /etc/apt/sources.list.d/*microsoft*.list /etc/apt/sources.list.d/*azure*.list 2>/dev/null || true
          npm init -y > /dev/null
          npm install --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Browser smoke test
        working-directory: "Cottage Holidays Blakeney"
        run: node e2e-test.js

      # Design-regression gate: layout invariants (no horizontal overflow, no
      # content cut off past the right edge, key content rendered) at phone /
      # tablet / desktop widths on the public views. Deterministic — no pixel
      # diffs, so no cross-machine font flakiness.
      - name: Layout regression gate
        working-directory: "Cottage Holidays Blakeney"
        run: node layout-test.js

      # The gate also screenshots every view×width — kept as an artifact so a
      # reviewer can eyeball the design straight from the PR checks page.
      - name: Upload layout screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layout-shots
          path: "Cottage Holidays Blakeney/layout-shots/"
          if-no-files-found: ignore
          retention-days: 14
