name: CI

# Tiny safety net: lint every PHP file and run the front-end smoke test on each
# pull request (and on pushes to main) so a broken edit can't reach production.

on:
  push:
    branches: [ main ]
  pull_request: {}

# One live run per PR: a new push cancels the previous (possibly hung) run
# instead of queueing behind it. Pushes to main never cancel each other.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # check-versions.js diffs against the PR base commit.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PHP syntax check (php -l on every .php)
        run: |
          set -e
          find "Cottage Holidays Blakeney" -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Front-end smoke test
        working-directory: "Cottage Holidays Blakeney"
        run: node smoke-test.js

      # The GIT half of the deploy checklist: if a PR changes a cached asset,
      # its cache-buster (?v= / BUILD / ADMIN_*_V / CACHE) must change too.
      # `node bump.js <stamp>` applies the whole chain in one go. (smoke-test
      # guards the static half — sw.js CORE ?v= == index.html ?v=.)
      - name: Version-chain consistency (changed asset → bumped version)
        working-directory: "Cottage Holidays Blakeney"
        env:
          CHB_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          CHB_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node check-versions.js

      - name: Search registry completeness
        working-directory: "Cottage Holidays Blakeney"
        run: node search-test.js

      # The answer-shape contract: ~100 real phrasings → expected answers over a
      # seeded booking set. Catches the "right machinery, wrong answer" class of
      # regression (e.g. a phrasing answering with the wrong date window).
      - name: Search golden-query corpus
        working-directory: "Cottage Holidays Blakeney"
        run: node golden-test.js

      - name: Pricing parity (PHP price_breakdown vs JS fixtures)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-pricing.php

      - name: Reply-by-email logic (tokens + quote stripping)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-reply.php

      - name: Customer directory grouping (strong-identity unify + false-merge guard)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-customers.php

      - name: Guest FAQ-miss capture (dedupe + count + cap aggregation)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-guestfaq.php

      - name: Square webhook signature verification
        working-directory: "Cottage Holidays Blakeney"
        run: php test-webhook.php

      - name: Request firewall (htaccess injection filter — no false positives, real coverage)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-waf.php

      # Locked-price emails: booking_price() → build_enquiry_reply_email() must
      # quote the AGREED snapshot for confirmed bookings, live rates only as the
      # legacy fallback — the guest-facing half of test-pricing.php's guard.
      - name: Locked-price email rendering
        working-directory: "Cottage Holidays Blakeney"
        run: php test-emails.php

      # Guest-registration form (UK hotel-records duty): validation + rendering
      # of the token-linked party form (guest-details.php pure functions).
      - name: Guest-registration form logic
        working-directory: "Cottage Holidays Blakeney"
        run: php test-guestreg.php

      # SQL statement splitter: a semicolon inside an inline comment must not
      # chop a migration in half (regression for the broken guest-registrations
      # migration — MySQL 1064 "near '' at line 8").
      - name: Migration SQL splitter
        working-directory: "Cottage Holidays Blakeney"
        run: php test-migrate.php

      # SMTP transport: runs mailer.php's real socket conversation against a
      # scriptable fake SMTP server — happy path, transient-retry, the
      # no-retry-after-payload guarantee (double-send safety), batch-over-one-
      # connection, mid-batch recipient rejection, and preview capture.
      - name: SMTP transport tests (fake server)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-smtp.php

      # Static "undefined reference" gate for the front-end JS — catches typo'd /
      # missing functions and variables (the "X is not defined" runtime errors)
      # before they ship, which php -l's JS equivalent (node --check) can't see.
      - name: Cache npm (eslint)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-eslint-${{ runner.os }}-v1

      - name: JS static check (ESLint no-undef)
        working-directory: "Cottage Holidays Blakeney"
        run: |
          npm init -y > /dev/null 2>&1
          npm install --no-audit --no-fund --prefer-offline eslint globals typescript@5.6.3
          node lint-js.js

      # Type-error RATCHET: tsc --checkJs as a linter (no build step, no runtime
      # change). Error counts per group must stay ≤ the committed budgets in
      # tsc-budget.json — the long tail of legacy "window.*" errors only ever
      # shrinks. Pinned typescript (counts differ across compiler versions).
      - name: JS type-check ratchet (tsc --checkJs vs tsc-budget.json)
        working-directory: "Cottage Holidays Blakeney"
        run: node typecheck.js

      # PHP static analysis — catches undefined functions/constants/variables and
      # wrong argument counts across every endpoint, far beyond php -l's syntax
      # check. A committed phpstan-baseline.neon (if present) scopes it to NEW code.
      # The phar is cached (it never changes for a pinned version) and so is
      # PHPStan's RESULT cache — unchanged files aren't re-analysed, which cuts
      # the analyse step from ~20s to a few seconds on typical PRs.
      - name: Cache PHPStan (phar + result cache)
        uses: actions/cache@v4
        with:
          path: |
            /tmp/phpstan.phar
            Cottage Holidays Blakeney/.phpstan-cache
          key: phpstan-2.2.5-${{ hashFiles('Cottage Holidays Blakeney/**/*.php') }}
          restore-keys: |
            phpstan-2.2.5-

      - name: PHP static analysis (PHPStan)
        working-directory: "Cottage Holidays Blakeney"
        run: |
          [ -s /tmp/phpstan.phar ] || curl -sSL https://github.com/phpstan/phpstan/releases/download/2.2.5/phpstan.phar -o /tmp/phpstan.phar
          php /tmp/phpstan.phar analyse -c phpstan.neon.dist --no-progress --error-format=table

  # The one suite that exercises the REAL stack: a fresh MySQL database,
  # schema.sql + every migration applied by migrate.php over HTTP, then the
  # actual JSON endpoints (admin session + CSRF, cottage creation, a public
  # enquiry approved into a booking with a locked price snapshot, a recorded
  # payment) served by php -S. Catches migration-ordering/SQL bugs that only
  # appear on a fresh database and endpoint auth/money regressions that
  # pure-function tests can't see. Uses the runner's preinstalled MySQL.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Start MySQL (preinstalled on the runner)
        run: |
          sudo systemctl start mysql
          mysql -h 127.0.0.1 -u root -proot -e "SELECT VERSION();"

      - name: Real-stack integration test (fresh DB → migrate → live endpoints)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-integration.php

  # Real-browser tests, split into PARALLEL jobs so the wall-clock is the
  # slowest single job rather than the sum. Plain ubuntu-latest runners (the
  # Playwright container image hung on this repo's runners) with the browser
  # binaries cached between runs — the install step is a cache hit except when
  # the pinned Playwright version changes.
  browser-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Only the browser/layout suites care about rendered output — skip the
      # (slow) browser install + tests when a PR touches nothing that renders.
      # The job still runs and reports SUCCESS so it stays a satisfied required
      # check. Fail-safe: if the diff can't be computed, we run everything.
      - name: Detect frontend changes
        id: fe
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }} ${{ github.sha }}"
          fi
          CHANGED=$(git diff --name-only $RANGE 2>/dev/null || echo __DIFF_FAILED__)
          if [ "$CHANGED" = "__DIFF_FAILED__" ] || echo "$CHANGED" | grep -qE 'index\.html|app\.(css|js)|admin\.(js|css)|guest-app\.(js|css)|home\.php|cottage\.php|experiences-page\.php|e2e-test\.js|ui-tests?\.js|ui-test-.*\.js|layout-test\.js|\.github/workflows/ci\.yml'; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "Frontend touched → running browser tests."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"; echo "No frontend changes → skipping browser tests (fast green)."
          fi

      - name: Set up Node
        if: steps.fe.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        if: steps.fe.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-1.61.1
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright (Chromium)
        if: steps.fe.outputs.run == 'true'
        working-directory: "Cottage Holidays Blakeney"
        run: |
          # The hosted runner's Microsoft/Azure apt repos intermittently serve an
          # unsigned InRelease ("NOSPLIT"), which fails `--with-deps`' apt-get and
          # kills the whole browser-test. We don't need those repos, so drop them
          # before the install.
          sudo rm -f /etc/apt/sources.list.d/*microsoft*.list /etc/apt/sources.list.d/*azure*.list 2>/dev/null || true
          npm init -y > /dev/null
          npm install --no-audit --no-fund playwright@1.61.1
          npx playwright install --with-deps chromium

      - name: Browser smoke test
        if: steps.fe.outputs.run == 'true'
        working-directory: "Cottage Holidays Blakeney"
        run: node e2e-test.js

      # Behaviour suites (booking hub, Needs-you, locked price, guest modals,
      # mailbox, Payments, merged workspace) — three suites at a time.
      - name: UI behaviour suites
        if: steps.fe.outputs.run == 'true'
        working-directory: "Cottage Holidays Blakeney"
        run: node ui-tests.js

  # Design-regression gate: layout invariants (no horizontal overflow, no
  # content cut off, key content rendered) at phone / tablet / desktop widths.
  # Chromium and WebKit run as parallel matrix legs; WebKit is Safari's engine
  # and catches iPhone-only overlaps Chromium can't reproduce.
  layout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        engine: [chromium, webkit]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Same path filter as browser-core: skip the layout gate on backend-only
      # PRs. Job still reports SUCCESS; fail-safe runs everything if unsure.
      - name: Detect frontend changes
        id: fe
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }} ${{ github.sha }}"
          fi
          CHANGED=$(git diff --name-only $RANGE 2>/dev/null || echo __DIFF_FAILED__)
          if [ "$CHANGED" = "__DIFF_FAILED__" ] || echo "$CHANGED" | grep -qE 'index\.html|app\.(css|js)|admin\.(js|css)|guest-app\.(js|css)|home\.php|cottage\.php|experiences-page\.php|e2e-test\.js|ui-tests?\.js|ui-test-.*\.js|layout-test\.js|\.github/workflows/ci\.yml'; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "Frontend touched → running layout gate."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"; echo "No frontend changes → skipping layout gate (fast green)."
          fi

      - name: Set up Node
        if: steps.fe.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        if: steps.fe.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.engine }}-1.61.1
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.engine }}-

      - name: Install Playwright (${{ matrix.engine }})
        if: steps.fe.outputs.run == 'true'
        working-directory: "Cottage Holidays Blakeney"
        run: |
          # (Same Microsoft-apt-repo cleanup as browser-core.)
          sudo rm -f /etc/apt/sources.list.d/*microsoft*.list /etc/apt/sources.list.d/*azure*.list 2>/dev/null || true
          npm init -y > /dev/null
          npm install --no-audit --no-fund playwright@1.61.1
          npx playwright install --with-deps ${{ matrix.engine }}

      - name: Layout regression gate (${{ matrix.engine }})
        if: steps.fe.outputs.run == 'true'
        working-directory: "Cottage Holidays Blakeney"
        env:
          CHB_ENGINE: ${{ matrix.engine == 'webkit' && 'webkit' || '' }}
        run: node layout-test.js

      # Every view×width screenshot, kept as an artifact so a reviewer can
      # eyeball the design straight from the PR checks page.
      - name: Upload layout screenshots
        if: always() && steps.fe.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: layout-shots-${{ matrix.engine }}
          path: "Cottage Holidays Blakeney/layout-shots/"
          if-no-files-found: ignore
          retention-days: 14
