name: CI

# Tiny safety net: lint every PHP file and run the front-end smoke test on each
# pull request (and on pushes to main) so a broken edit can't reach production.

on:
  push:
    branches: [ main ]
  pull_request: {}

# One live run per PR: a new push cancels the previous (possibly hung) run
# instead of queueing behind it. Pushes to main never cancel each other.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PHP syntax check (php -l on every .php)
        run: |
          set -e
          find "Cottage Holidays Blakeney" -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Front-end smoke test
        working-directory: "Cottage Holidays Blakeney"
        run: node smoke-test.js

      - name: Search registry completeness
        working-directory: "Cottage Holidays Blakeney"
        run: node search-test.js

      - name: Pricing parity (PHP price_breakdown vs JS fixtures)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-pricing.php

      - name: Reply-by-email logic (tokens + quote stripping)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-reply.php

      # Locked-price emails: booking_price() → build_enquiry_reply_email() must
      # quote the AGREED snapshot for confirmed bookings, live rates only as the
      # legacy fallback — the guest-facing half of test-pricing.php's guard.
      - name: Locked-price email rendering
        working-directory: "Cottage Holidays Blakeney"
        run: php test-emails.php

      # Guest-registration form (UK hotel-records duty): validation + rendering
      # of the token-linked party form (guest-details.php pure functions).
      - name: Guest-registration form logic
        working-directory: "Cottage Holidays Blakeney"
        run: php test-guestreg.php

      # SQL statement splitter: a semicolon inside an inline comment must not
      # chop a migration in half (regression for the broken guest-registrations
      # migration — MySQL 1064 "near '' at line 8").
      - name: Migration SQL splitter
        working-directory: "Cottage Holidays Blakeney"
        run: php test-migrate.php

      # SMTP transport: runs mailer.php's real socket conversation against a
      # scriptable fake SMTP server — happy path, transient-retry, the
      # no-retry-after-payload guarantee (double-send safety), batch-over-one-
      # connection, mid-batch recipient rejection, and preview capture.
      - name: SMTP transport tests (fake server)
        working-directory: "Cottage Holidays Blakeney"
        run: php test-smtp.php

      # Static "undefined reference" gate for the front-end JS — catches typo'd /
      # missing functions and variables (the "X is not defined" runtime errors)
      # before they ship, which php -l's JS equivalent (node --check) can't see.
      - name: Cache npm (eslint)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-eslint-${{ runner.os }}-v1

      - name: JS static check (ESLint no-undef)
        working-directory: "Cottage Holidays Blakeney"
        run: |
          npm init -y > /dev/null 2>&1
          npm install --no-audit --no-fund --prefer-offline eslint globals
          node lint-js.js

      # PHP static analysis — catches undefined functions/constants/variables and
      # wrong argument counts across every endpoint, far beyond php -l's syntax
      # check. A committed phpstan-baseline.neon (if present) scopes it to NEW code.
      # The phar is cached (it never changes for a pinned version) and so is
      # PHPStan's RESULT cache — unchanged files aren't re-analysed, which cuts
      # the analyse step from ~20s to a few seconds on typical PRs.
      - name: Cache PHPStan (phar + result cache)
        uses: actions/cache@v4
        with:
          path: |
            /tmp/phpstan.phar
            Cottage Holidays Blakeney/.phpstan-cache
          key: phpstan-2.2.5-${{ hashFiles('Cottage Holidays Blakeney/**/*.php') }}
          restore-keys: |
            phpstan-2.2.5-

      - name: PHP static analysis (PHPStan)
        working-directory: "Cottage Holidays Blakeney"
        run: |
          [ -s /tmp/phpstan.phar ] || curl -sSL https://github.com/phpstan/phpstan/releases/download/2.2.5/phpstan.phar -o /tmp/phpstan.phar
          php /tmp/phpstan.phar analyse -c phpstan.neon.dist --no-progress --error-format=table

  # Real-browser tests, split into PARALLEL jobs so the wall-clock is the
  # slowest single job rather than the sum. Plain ubuntu-latest runners (the
  # Playwright container image hung on this repo's runners) with the browser
  # binaries cached between runs — the install step is a cache hit except when
  # the pinned Playwright version changes.
  browser-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-1.61.1

      - name: Install Playwright (Chromium)
        working-directory: "Cottage Holidays Blakeney"
        run: |
          # The hosted runner's Microsoft/Azure apt repos intermittently serve an
          # unsigned InRelease ("NOSPLIT"), which fails `--with-deps`' apt-get and
          # kills the whole browser-test. We don't need those repos, so drop them
          # before the install.
          sudo rm -f /etc/apt/sources.list.d/*microsoft*.list /etc/apt/sources.list.d/*azure*.list 2>/dev/null || true
          npm init -y > /dev/null
          npm install --no-audit --no-fund playwright@1.61.1
          npx playwright install --with-deps chromium

      - name: Browser smoke test
        working-directory: "Cottage Holidays Blakeney"
        run: node e2e-test.js

      # Behaviour suites (booking hub, Needs-you, locked price, guest modals,
      # mailbox, Payments, merged workspace) — three suites at a time.
      - name: UI behaviour suites
        working-directory: "Cottage Holidays Blakeney"
        run: node ui-tests.js

  # Design-regression gate: layout invariants (no horizontal overflow, no
  # content cut off, key content rendered) at phone / tablet / desktop widths.
  # Chromium and WebKit run as parallel matrix legs; WebKit is Safari's engine
  # and catches iPhone-only overlaps Chromium can't reproduce.
  layout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        engine: [chromium, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.engine }}-1.61.1

      - name: Install Playwright (${{ matrix.engine }})
        working-directory: "Cottage Holidays Blakeney"
        run: |
          # (Same Microsoft-apt-repo cleanup as browser-core.)
          sudo rm -f /etc/apt/sources.list.d/*microsoft*.list /etc/apt/sources.list.d/*azure*.list 2>/dev/null || true
          npm init -y > /dev/null
          npm install --no-audit --no-fund playwright@1.61.1
          npx playwright install --with-deps ${{ matrix.engine }}

      - name: Layout regression gate (${{ matrix.engine }})
        working-directory: "Cottage Holidays Blakeney"
        env:
          CHB_ENGINE: ${{ matrix.engine == 'webkit' && 'webkit' || '' }}
        run: node layout-test.js

      # Every view×width screenshot, kept as an artifact so a reviewer can
      # eyeball the design straight from the PR checks page.
      - name: Upload layout screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layout-shots-${{ matrix.engine }}
          path: "Cottage Holidays Blakeney/layout-shots/"
          if-no-files-found: ignore
          retention-days: 14
